<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Eaters Stat Quiz</title>
<style>
  :root {
    --bg: #14100f;
    --panel: #1f1816;
    --panel2: #2a201d;
    --line: #3d2c27;
    --blood: #8a1409;
    --blood-bright: #c41f10;
    --brass: #b8893b;
    --text: #ece3df;
    --muted: #9a8983;
    --green: #2f7d33;
    --green-bg: #16331a;
    --red: #a11d12;
    --red-bg: #361310;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% -10%, #2a1310 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 64px;
  }
  .layout {
    max-width: 1180px; margin: 0 auto;
    display: flex; gap: 20px; align-items: flex-start;
  }
  .main { flex: 1 1 auto; min-width: 0; max-width: 880px; }
  /* sidebar */
  .sidebar {
    flex: 0 0 230px; position: sticky; top: 16px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px; max-height: calc(100vh - 32px);
    display: flex; flex-direction: column;
  }
  .sidebar.collapsed { display: none; }
  .sb-head h2 {
    margin: 0 0 8px; font-size: .95rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--brass);
  }
  .sb-head .count { color: var(--muted); font-size: .8rem; letter-spacing: 0; }
  .sb-btns { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .sb-btns button {
    flex: 1 1 auto; font-size: .68rem; padding: 6px 4px; text-transform: uppercase;
    letter-spacing: .5px; border-radius: 6px; background: var(--panel2);
    color: var(--text); border: 1px solid var(--line); cursor: pointer;
  }
  .sb-btns button:hover { border-color: var(--brass); color: var(--brass); }
  .unit-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; }
  .unit {
    display: flex; align-items: center; gap: 8px; padding: 6px 6px;
    border-radius: 6px; cursor: pointer; font-size: .85rem; color: var(--muted);
    user-select: none;
  }
  .unit:hover { background: var(--panel2); }
  .unit .box {
    flex: 0 0 16px; width: 16px; height: 16px; border-radius: 4px;
    border: 1px solid var(--line); display: flex; align-items: center;
    justify-content: center; font-size: .7rem; color: transparent;
  }
  .unit.on { color: var(--text); }
  .unit.on .box { background: var(--blood); border-color: var(--blood-bright); color: #fff; }
  .sb-toggle {
    position: absolute; left: 0; top: 0; background: var(--panel2);
    color: var(--brass); border: 1px solid var(--line); border-radius: 6px;
    width: 34px; height: 34px; font-size: 1rem; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .sb-toggle:hover { border-color: var(--brass); }
  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 1rem; }
  header { text-align: center; margin-bottom: 18px; position: relative; }
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar { position: static; flex-basis: auto; width: 100%; max-height: 300px; }
  }
  h1 {
    font-size: 1.9rem; margin: 0;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--blood-bright);
    text-shadow: 0 0 14px rgba(196,31,16,.5);
  }
  .sub { color: var(--muted); font-size: .85rem; margin-top: 4px; }
  .score { font-size: .85rem; color: var(--brass); margin-top: 6px; }
  .card {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 18px 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  .dsname {
    font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text); margin: 0 0 14px; border-bottom: 2px solid var(--blood);
    padding-bottom: 8px;
  }
  .section-label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--brass); margin: 18px 0 8px;
  }
  /* stat row */
  .stats { display: flex; flex-wrap: wrap; gap: 8px; }
  .statcell {
    flex: 1 1 0; min-width: 64px; text-align: center;
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 4px;
  }
  .statcell .lbl { font-size: .68rem; color: var(--muted); letter-spacing: 1px; }
  .statcell .val { font-size: 1.25rem; font-weight: 700; margin-top: 2px; }
  /* weapons table */
  table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: .9rem; }
  th, td { padding: 6px 6px; text-align: center; border-bottom: 1px solid var(--line); }
  th { font-size: .66rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  td.wname { text-align: left; font-weight: 600; }
  .wkw { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
  .kw {
    font-size: .6rem; text-transform: uppercase; letter-spacing: .5px; font-weight: 700;
    color: var(--brass); background: rgba(184,137,59,.12);
    border: 1px solid rgba(184,137,59,.45); border-radius: 4px; padding: 1px 5px;
  }
  .wtable.melee .kw { color: #e08a80; background: rgba(196,31,16,.12); border-color: rgba(196,31,16,.4); }
  .wtable { border-left: 3px solid var(--brass); padding-left: 6px; }
  .wtable.melee { border-left-color: var(--blood-bright); }
  .wtable.ranged thead th { color: var(--brass); }
  .wtable.melee thead th { color: #e08a80; }
  /* inputs */
  input.blank {
    width: 100%; max-width: 72px; text-align: center;
    background: #0d0908; color: var(--text);
    border: 1px solid var(--brass); border-radius: 6px;
    padding: 6px 2px; font-size: 1rem; font-weight: 700;
    font-family: inherit;
  }
  input.blank:focus { outline: none; border-color: var(--blood-bright); box-shadow: 0 0 8px rgba(196,31,16,.5); }
  input.blank.wrong-input { border-color: var(--red); background: var(--red-bg); }
  select.kw-select {
    font-family: inherit; font-size: .7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; max-width: 100%;
    color: var(--brass); background: #0d0908;
    border: 1px solid var(--brass); border-radius: 4px; padding: 3px 4px; cursor: pointer;
  }
  select.kw-select:focus { outline: none; border-color: var(--blood-bright); box-shadow: 0 0 8px rgba(196,31,16,.5); }
  select.kw-select.wrong-input { border-color: var(--red); background: var(--red-bg); color: #f6b4ac; }
  .val-wrap { display: inline-block; min-width: 64px; }
  .hint { display: block; margin-top: 3px; font-size: .68rem; font-weight: 700; letter-spacing: .5px; }
  .hint.up { color: #ffcaa0; }
  .hint.down { color: #9ec8ff; }
  .hint.off { color: var(--muted); }
  .result-block {
    display: inline-block; min-width: 56px; padding: 6px 4px;
    border-radius: 6px; font-weight: 700;
  }
  .correct { background: var(--green-bg); border: 1px solid var(--green); color: #b6f0b9; }
  .wrong { background: var(--red-bg); border: 1px solid var(--red); color: #f6b4ac; }
  .wrong .yours { text-decoration: line-through; opacity: .7; font-weight: 500; }
  .wrong .actual { display: block; font-size: .95rem; }
  /* buttons */
  .controls { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
  button {
    flex: 1 1 auto; cursor: pointer; font-family: inherit;
    font-size: .95rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 12px 16px; border-radius: 8px;
    border: 1px solid transparent; transition: transform .05s, filter .15s;
  }
  button:active { transform: translateY(1px); }
  .btn-submit { background: var(--blood); color: #fff; border-color: var(--blood-bright); }
  .btn-submit:hover { filter: brightness(1.15); }
  .btn-next { background: var(--brass); color: #14100f; }
  .btn-next:hover { filter: brightness(1.1); }
  .btn-skip { background: transparent; color: var(--muted); border-color: var(--line); }
  .btn-skip:hover { color: var(--text); border-color: var(--brass); }
  .hidden { display: none !important; }
  .feedback { margin-top: 14px; text-align: center; font-weight: 700; font-size: 1rem; min-height: 1.2em; }
  .feedback.allright { color: #b6f0b9; }
  .feedback.some { color: #f6b4ac; }
  .feedback.skipped { color: var(--brass); }
  .statcell.invul { border-color: var(--brass); background: #1a130a; }
  .statcell.invul .lbl { color: var(--brass); }
</style>
</head>

  <main class="main">

      <div class="score" id="score">Score: 0 / 0 &nbsp;·&nbsp; Streak: 0</div>
    </header>

    <div class="card" id="card"></div>
  </main>
</div>

// All distinct keyword sets across every weapon — used to build dropdown distractors.
const ALL_KW_COMBOS = [...new Set(
  DATA.flatMap(d => d.weapons)
      .filter(w => w.keywords && w.keywords.length)
      .map(w => w.keywords.join(", "))
)];

let state = { correct: 0, total: 0, streak: 0, blanks: [], done: false, attempts: 0 };

function rint(n){ return Math.floor(Math.random()*n); }
function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){ const j = rint(i+1); [arr[i],arr[j]] = [arr[j],arr[i]]; }
  return arr;
}

// Build the flat list of "fields" (stat cells + weapon-profile cells) for a datasheet
function buildFields(ds){
  const fields = [];
  const S = ds.stats;
  [["M","m"],["T","t"],["SV","sv"],["W","w"],["LD","ld"],["OC","oc"]].forEach(([lbl,key])=>{
    if (S[key] !== "") fields.push({ loc:"stat", lbl, key, value:S[key], id:"stat-"+key });
  });
  if (ds.invul) fields.push({ loc:"stat", lbl:"INV", key:"invul", value:ds.invul, id:"stat-invul" });
  ds.weapons.forEach((w, wi)=>{
    [["A","a"],["SKILL","skill"],["S","s"],["AP","ap"],["D","d"]].forEach(([lbl,key])=>{
      if (w[key] !== "") fields.push({ loc:"weapon", wi, lbl, key, value:w[key], id:"wpn-"+wi+"-"+key });
    });
    if (w.keywords && w.keywords.length){
      fields.push({ loc:"weaponkw", wi, lbl:"Keywords", key:"keywords",
        value:w.keywords.join(", "), id:"wpn-"+wi+"-kw" });
    }
  });
  return fields;
}

// ---- Unit enable/disable (persisted in localStorage) ----
const LS_KEY = 'worldEatersQuizDisabled';
let disabled = loadDisabled();

function loadDisabled(){
  try { return new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); }
  catch(e){ return new Set(); }
}
function saveDisabled(){
  try { localStorage.setItem(LS_KEY, JSON.stringify([...disabled])); } catch(e){}
}
function isEnabled(name){ return !disabled.has(name); }
// Pool of enabled units that have enough fields to quiz.
function pool(){ return DATA.filter(d => isEnabled(d.name) && buildFields(d).length >= 3); }

let current = null;

function newQuestion(){
  const p = pool();
  if (!p.length){ current = null; renderEmpty(); return; }
  const ds = p[rint(p.length)];
  current = { ds, fields: buildFields(ds) };
  state.done = false;
  state.attempts = 0;
  // choose 3 distinct field indices to blank
  const idxs = [];
  while (idxs.length < 3){
    const r = rint(current.fields.length);
    if (!idxs.includes(r)) idxs.push(r);
  }
  state.blanks = idxs;
  render();
}

function renderEmpty(){
  document.getElementById('card').innerHTML =
    '<div class="empty">No units enabled.<br>Pick at least one from the unit list to start the quiz.</div>';
}

// ---- Sidebar ----
function renderSidebar(){
  const enabledCount = DATA.filter(d => isEnabled(d.name)).length;
  document.getElementById('unitCount').textContent = '(' + enabledCount + '/' + DATA.length + ')';
  const list = document.getElementById('unitList');
  list.innerHTML = DATA.map(d => {
    const on = isEnabled(d.name);
    return '<li class="unit' + (on ? ' on' : '') + '" data-name="' + escapeAttr(d.name) + '">' +
      '<span class="box">&#10003;</span><span class="uname">' + escapeHtml(d.name) + '</span></li>';
  }).join('');
  list.querySelectorAll('.unit').forEach(li => {
    li.addEventListener('click', () => toggleUnit(li.getAttribute('data-name')));
  });
}

// After any change to the enabled set, keep the current question consistent.
function syncQuestion(){
  if (!pool().length){ current = null; renderEmpty(); }
  else if (!current){ newQuestion(); }
}

function toggleUnit(name){
  if (disabled.has(name)) disabled.delete(name); else disabled.add(name);
  saveDisabled();
  renderSidebar();
  syncQuestion();
}
function setAll(on){
  disabled = on ? new Set() : new Set(DATA.map(d => d.name));
  saveDisabled();
  renderSidebar();
  syncQuestion();
}
function render(){
  const { ds, fields } = current;
  // Which cells are blanked, looked up by stable id (decoupled from render order).
  const blankIds = new Set(state.blanks.map(i => fields[i].id));
  const isBlank = (id) => blankIds.has(id);

  // STATS
  const statOrder = [["M","m"],["T","t"],["SV","sv"],["W","w"],["LD","ld"],["OC","oc"]]
    .filter(([_,k]) => ds.stats[k] !== "");

  let statsHtml = '<div class="stats">';
  for (const [lbl,key] of statOrder){
    statsHtml += '<div class="statcell"><div class="lbl">'+lbl+'</div><div class="val">'+
      cell(isBlank("stat-"+key), ds.stats[key], "stat-"+key)+'</div></div>';
  }
  if (ds.invul){
    statsHtml += '<div class="statcell invul"><div class="lbl">INV</div><div class="val">'+
      cell(isBlank("stat-invul"), ds.invul, "stat-invul")+'</div></div>';
  }
  statsHtml += '</div>';

  // WEAPONS — ranged and melee in separate tables, with kind-specific skill header.
  function weaponTable(kind, label, skillHdr){
    const rows = [];
    ds.weapons.forEach((w, wi)=>{
      if (w.kind !== kind) return;
      const cells = ["a","skill","s","ap","d"].map((key)=>
        '<td>'+cell(isBlank("wpn-"+wi+"-"+key), w[key], "wpn-"+wi+"-"+key)+'</td>'
      ).join('');
      let kw = '';
      if (w.keywords && w.keywords.length){
        kw = isBlank("wpn-"+wi+"-kw")
          ? kwSelect(w, "wpn-"+wi+"-kw")
          : '<div class="wkw">'+w.keywords.map(k=>'<span class="kw">'+escapeHtml(k)+'</span>').join('')+'</div>';
      }
      rows.push('<tr><td class="wname">'+escapeHtml(w.name)+kw+'</td><td>'+escapeHtml(w.range)+'</td>'+cells+'</tr>');
    });
    if (!rows.length) return '';
    return '<div class="section-label">'+label+'</div>'+
      '<table class="wtable '+kind+'"><thead><tr>'+
        '<th class="wname" style="text-align:left">Weapon</th><th>Range</th>'+
        '<th>A</th><th>'+skillHdr+'</th><th>S</th><th>AP</th><th>D</th>'+
      '</tr></thead><tbody>'+rows.join('')+'</tbody></table>';
  }

  const wHtml = weaponTable("ranged", "Ranged Weapons", "BS") +
                weaponTable("melee", "Melee Weapons", "WS");

  document.getElementById('card').innerHTML =
    '<h2 class="dsname">'+escapeHtml(ds.name)+'</h2>'+
    '<div class="section-label">Stat Line</div>'+ statsHtml + wHtml +
    '<div class="feedback" id="feedback"></div>'+
    '<div class="controls">'+
      '<button class="btn-skip" id="btnSkip">Skip / Reveal</button>'+
      '<button class="btn-submit" id="btnSubmit">Submit</button>'+
      '<button class="btn-next hidden" id="btnNext">Next &raquo;</button>'+
    '</div>';

  document.getElementById('btnSubmit').addEventListener('click', onSubmit);
  document.getElementById('btnSkip').addEventListener('click', onSkip);
  document.getElementById('btnNext').addEventListener('click', newQuestion);

  // focus first blank
  const first = document.querySelector('.answer');
  if (first) first.focus();

  // enter to submit
  document.querySelectorAll('input.blank').forEach(inp=>{
    inp.addEventListener('keydown', e=>{
      if (e.key === 'Enter'){ e.preventDefault(); onSubmit(); }
    });
  });
}

// Render a single value cell: either an input (blanked) or the plain value.
function cell(blanked, value, id){
  if (blanked){
    return '<span class="val-wrap"><input class="blank answer" data-id="'+id+'" data-answer="'+
      escapeAttr(value)+'" autocomplete="off" spellcheck="false"></span>';
  }
  return '<span class="val-wrap">'+escapeHtml(value)+'</span>';
}

// Render the keyword dropdown for a blanked weapon: correct set + shuffled distractors.
function kwSelect(w, id){
  const correct = w.keywords.join(", ");
  const distractors = shuffle(ALL_KW_COMBOS.filter(c => c !== correct)).slice(0, 5);
  const options = shuffle([correct, ...distractors]);
  return '<div class="wkw"><select class="answer kw-select" data-id="'+id+'" data-answer="'+escapeAttr(correct)+'">'+
    '<option value="" selected disabled>— pick keywords —</option>'+
    options.map(o => '<option value="'+escapeAttr(o)+'">'+escapeHtml(o)+'</option>').join('')+
    '</select></div>';
}

function normalize(s){
  return String(s).trim().toLowerCase()
    .replace(/["”“]/g,'"')
    .replace(/\s+/g,'')
    .replace(/^[+-]/,'')   // AP: "2" matches "-2" (never positive); also leading +
    .replace(/\+$/,'');   // skill/save: "3" matches "3+" (these are never negative)
}

function answersMatch(given, actual){
  const g = normalize(given), a = normalize(actual);
  if (g === a) return true;
  // tolerate missing quote on movement etc: 6 vs 6"
  if (g.replace(/"/g,'') === a.replace(/"/g,'')) return true;
  return false;
}

// Comparable magnitude for a value. Uses the normalized (sign-stripped) form,
// so AP "-3" -> 3 ranks ABOVE AP "-2" -> 2 (intuitive "better/worse" ordering).
// Dice expressions (e.g. "D6+2", "2D3") collapse to their average.
function numFor(s){
  const n = normalize(s);
  const dice = n.match(/^(\d*)d(\d+)([+-]\d+)?$/);
  if (dice){
    const count = dice[1] ? parseInt(dice[1],10) : 1;
    const sides = parseInt(dice[2],10);
    const mod = dice[3] ? parseInt(dice[3],10) : 0;
    return count*(sides+1)/2 + mod;
  }
  const f = parseFloat(n);
  return isNaN(f) ? null : f;
}

// >0 -> the real answer is higher than the guess; <0 -> lower; 0/null -> unknown.
function direction(given, actual){
  const g = numFor(given), a = numFor(actual);
  if (g === null || a === null) return null;
  if (a > g) return 1;
  if (a < g) return -1;
  return 0;
}

function onSubmit(){
  if (state.done) return;
  state.attempts += 1;
  const inputs = [...document.querySelectorAll('.answer')];
  inputs.forEach(inp=>{
    const actual = inp.getAttribute('data-answer');
    const given = inp.value;
    if (answersMatch(given, actual)){
      lockCorrect(inp, actual);
    } else {
      showHint(inp, given, actual);
    }
  });
  const remaining = document.querySelectorAll('.answer').length;
  const fb = document.getElementById('feedback');
  if (remaining === 0){
    finish(true);
  } else {
    fb.className = 'feedback some';
    fb.textContent = remaining === 1
      ? 'One to go — follow the hint and guess again.'
      : remaining + ' still off — follow the hints and guess again.';
    const first = document.querySelector('.answer');
    if (first){ first.focus(); if (first.select) first.select(); }
  }
}

function onSkip(){
  if (state.done) return;
  document.querySelectorAll('.answer').forEach(inp=>{
    revealAnswer(inp, inp.getAttribute('data-answer'));
  });
  finish(false);
}

// Correct guess: replace input with a locked green block.
function lockCorrect(inp, actual){
  const span = document.createElement('span');
  span.className = 'result-block correct';
  span.textContent = actual;
  inp.parentNode.replaceChild(span, inp);
}

// Wrong guess (Submit): keep the input editable, show a higher/lower hint.
function showHint(inp, given, actual){
  inp.classList.add('wrong-input');
  const wrap = inp.parentNode;
  let h = wrap.querySelector('.hint');
  if (!h){ h = document.createElement('span'); wrap.appendChild(h); }
  // Keyword dropdowns have no higher/lower ordering — just flag the wrong pick.
  if (inp.tagName === 'SELECT'){ h.className = 'hint off'; h.textContent = '✗ Try again'; return; }
  const dir = direction(given, actual);
  if (dir > 0){ h.className = 'hint up'; h.textContent = '▲ Higher'; }
  else if (dir < 0){ h.className = 'hint down'; h.textContent = '▼ Lower'; }
  else { h.className = 'hint off'; h.textContent = '✗ Off'; }
}

// Skip: reveal the real answer in a red block.
function revealAnswer(inp, actual){
  const wrap = inp.parentNode;
  const hint = wrap.querySelector('.hint');
  if (hint) hint.remove();
  const span = document.createElement('span');
  span.className = 'result-block wrong';
  span.innerHTML = '<span class="actual">'+escapeHtml(actual)+'</span>';
  inp.parentNode.replaceChild(span, inp);
}

function finish(solved){
  state.done = true;
  state.total += 1;
  const fb = document.getElementById('feedback');
  if (solved){
    state.correct += 1;
    state.streak += 1;
    fb.className = 'feedback allright';
    fb.textContent = state.attempts === 1
      ? 'BLOOD FOR THE BLOOD GOD! All 3 first try.'
      : 'All correct in ' + state.attempts + ' attempts. Skulls claimed.';
  } else {
    state.streak = 0;
    fb.className = 'feedback skipped';
    fb.textContent = 'Revealed — no points. Onward, for the skull throne.';
  }
  document.getElementById('score').textContent =
    'Score: '+state.correct+' / '+state.total+'  ·  Streak: '+state.streak;
  document.getElementById('btnSubmit').classList.add('hidden');
  document.getElementById('btnSkip').classList.add('hidden');
  const next = document.getElementById('btnNext');
  next.classList.remove('hidden');
  next.focus();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function escapeAttr(s){ return escapeHtml(s); }

// ---- Wire up controls ----
document.getElementById('allOn').addEventListener('click', () => setAll(true));
document.getElementById('allOff').addEventListener('click', () => setAll(false));
document.getElementById('sbToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

renderSidebar();
newQuestion();
</script>
